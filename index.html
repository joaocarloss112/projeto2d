<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto — Pênalti 2D</title>
    <style>
        html, body { 
            height: 100%; margin: 0; padding: 0; overflow: hidden; 
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; background-color: #2c3e50;
            font-family: 'Arial', sans-serif; color: white;
        }
        h2 { margin: 5px 0; font-size: 1.4em; }
        .instrucoes { font-size: 0.9em; margin-bottom: 5px; color: #ecf0f1; }
        canvas { 
            border: 3px solid #fff; background-color: #27ae60; 
            cursor: crosshair; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <h2>Penalidade máxima senhoras e senhores!</h2>
    <p class="instrucoes">Clique no gol para chutar! || Use as setas para mover a bola</p>
    
    <canvas id="canvas" width="700" height="500"></canvas>

    <script src="main.js"></script>
</body>
</html>
